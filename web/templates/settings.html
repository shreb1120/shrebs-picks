<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shrebs Picks - Settings</title>
    <meta name="theme-color" content="#060a14">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%234f8fff'/%3E%3Ctext x='50' y='68' font-family='Inter,system-ui,sans-serif' font-size='48' font-weight='900' fill='white' text-anchor='middle'%3ESP%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --bg: #060a14;
            --surface: rgba(12, 18, 35, 0.95);
            --stroke: rgba(255,255,255,0.06);
            --stroke-2: rgba(255,255,255,0.1);
            --text: #f0f4ff;
            --text-2: #d0d8f0;
            --muted: #6b7a9e;
            --accent: #4f8fff;
            --green: #22c55e;
            --green-glow: rgba(34,197,94,0.12);
            --radius: 14px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; right: 0;
            height: 600px;
            background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(79,143,255,0.08), transparent);
            pointer-events: none; z-index: 0;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(6,10,20,0.82);
            backdrop-filter: blur(24px) saturate(1.2);
            -webkit-backdrop-filter: blur(24px) saturate(1.2);
            border-bottom: 1px solid var(--stroke);
            padding: 14px 0;
        }
        .header-inner {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 12px;
        }
        .logo { display: flex; align-items: center; gap: 14px; text-decoration: none; color: inherit; }
        .logo-icon {
            width: 42px; height: 42px; border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #6366f1);
            display: grid; place-items: center;
            font-weight: 900; font-size: 15px; color: #fff;
            box-shadow: 0 4px 16px rgba(79,143,255,0.25);
        }
        .logo-text { font-weight: 700; font-size: 20px; letter-spacing: -0.3px; }
        .logo-text small {
            display: block; font-size: 11px; color: var(--muted); font-weight: 400;
            text-transform: uppercase; letter-spacing: 1.8px; margin-top: 1px;
        }
        .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .nav-links { display: flex; gap: 4px; }
        .nav-link {
            padding: 7px 16px; border-radius: 10px; font-size: 13px; font-weight: 500;
            text-decoration: none; color: var(--muted); transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        .nav-link.active {
            color: var(--text); background: rgba(79,143,255,0.12);
            border-color: rgba(79,143,255,0.2);
        }
        .settings-card {
            max-width: 500px; margin: 48px auto; padding: 32px;
            background: var(--surface); border: 1px solid var(--stroke);
            border-radius: 18px;
        }
        .settings-title {
            font-size: 20px; font-weight: 700; margin-bottom: 24px;
            letter-spacing: -0.3px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 12px; font-weight: 600; color: var(--muted);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
        }
        .form-group input {
            width: 100%; padding: 12px 16px; border-radius: 10px;
            background: rgba(0,0,0,0.3); border: 1px solid var(--stroke-2);
            color: var(--text); font-size: 16px; font-family: inherit;
            transition: border-color 0.2s ease; outline: none;
        }
        .form-group input:focus { border-color: var(--accent); }
        .form-group .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
        .btn {
            padding: 12px 24px; border-radius: 10px; border: none;
            background: linear-gradient(135deg, var(--accent), #6366f1);
            color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: opacity 0.2s ease;
        }
        .btn:hover { opacity: 0.9; }
        .message {
            padding: 10px 14px; border-radius: 8px; margin-bottom: 18px;
            background: var(--green-glow); border: 1px solid rgba(34,197,94,0.2);
            color: var(--green); font-size: 13px; font-weight: 500;
        }
        footer {
            padding: 48px 0 32px; text-align: center; color: var(--muted);
            font-size: 12px; border-top: 1px solid var(--stroke); margin-top: 56px;
        }
        .footer-brand { font-weight: 700; color: var(--text-2); font-size: 14px; margin-bottom: 6px; }
        .footer-sub { font-size: 11px; color: var(--muted); }
        @media (max-width: 640px) {
            .header-inner { flex-direction: column; align-items: flex-start; gap: 10px; }
            .header-right { width: 100%; justify-content: space-between; }
            .settings-card { margin: 24px 0; padding: 24px; }
            .container { padding: 0 14px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-inner">
            <a href="/" class="logo">
                <div class="logo-icon">SP</div>
                <div class="logo-text">Shrebs Picks<small>Settings</small></div>
            </a>
            <div class="header-right">
                <nav class="nav-links">
                    <a href="/" class="nav-link">Today</a>
                    <a href="/history" class="nav-link">History</a>
                    <a href="/kalshi" class="nav-link">Kalshi</a>
                    <a href="/settings" class="nav-link active">Settings</a>
                    <a href="/logout" class="nav-link">Logout</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="settings-card">
            <div class="settings-title">Bankroll Settings</div>
            {% if message %}
            <div class="message">{{ message }}</div>
            {% endif %}
            <form method="POST">
                <div class="form-group">
                    <label for="starting_amount">Starting Bankroll ($)</label>
                    <input type="number" id="starting_amount" name="starting_amount" value="{{ starting }}" step="0.01" min="0.01" required>
                    <div class="hint">This is used to calculate your ROI and chart your bankroll over time.</div>
                </div>
                <button type="submit" class="btn">Save Changes</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-brand">Shrebs Picks</div>
            <div class="footer-sub">Settings &bull; Bankroll Configuration</div>
        </div>
    </footer>
</body>
</html>
